<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Párový turnaj 2026 - Disciplíny</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      color: #111;
    }

    .header {
      text-align: center;
      background: #eaeaea;
      padding-top: 20px;
    }

    .header h1 {
      margin: 0 0 20px 0;
      font-size: 2.6rem;
    }

    .navbar {
      background: #333;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    .content {
      padding: 30px 20px;
    }

    .section {
      background: white;
      padding: 25px;
      margin: 0 auto 25px auto;
      max-width: 1000px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .discipline-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .discipline-nav button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      background: #ddd;
      border-radius: 6px;
      font-size: 15px;
    }

    .discipline-card {
      margin-bottom: 24px;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      scroll-margin-top: 20px;
    }

    .discipline-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .results-table th,
    .results-table td {
      border: 2px solid #111;
      padding: 12px 10px;
      font-size: 18px;
    }

    .results-table th {
      background: #f3f3f3;
    }

    .team-name {
      text-align: left;
      font-weight: bold;
    }

    .place-cell {
      text-align: center;
    }

    .hint {
      color: #666;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .header h1 {
        font-size: 2rem;
      }

      .discipline-title {
        font-size: 1.25rem;
      }

      .results-table th,
      .results-table td {
        font-size: 16px;
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Párový turnaj 2026</h1>
    <div class="navbar">
      <a href="index.html">Domů</a>
      <a href="disciplines.html">Disciplíny</a>
      <a href="administrace.html">Administrace</a>
    </div>
  </div>

  <div class="content">
    <div class="section">
      <h2>Disciplíny</h2>
      <div id="disciplineNav" class="discipline-nav"></div>
      <div id="disciplinesContent" class="hint"></div>
    </div>
  </div>

  <script type="module">
    import { subscribeToData } from "./firebase.js";

    function ordinal(place) {
      const n = Number(place);
      if (!n) return "-";
      return `${n}.`;
    }

    function createResultTable(teams, resultMap) {
      const table = document.createElement("table");
      table.className = "results-table";
      table.innerHTML = "<thead><tr><th>Tým</th><th>Umístění</th></tr></thead>";

      const tbody = document.createElement("tbody");

      teams.forEach((team) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="team-name">${team}</td>
          <td class="place-cell">${ordinal(resultMap?.[team] || "")}</td>
        `;
        tbody.appendChild(row);
      });

      table.appendChild(tbody);
      return table;
    }

    function renderDisciplinesPage(data) {
      const container = document.getElementById("disciplinesContent");
      const nav = document.getElementById("disciplineNav");
      const { teams, disciplines, disciplineResults } = data;

      if (disciplines.length === 0) {
        nav.innerHTML = "";
        container.innerHTML = "Zatím nejsou přidané žádné disciplíny. Přidej je v sekci Administrace.";
        return;
      }

      container.innerHTML = "";
      nav.innerHTML = "";

      disciplines.forEach((discipline) => {
        const safeId = "disc-" + discipline.replace(/[^a-zA-Z0-9_-]/g, "_");

        const navBtn = document.createElement("button");
        navBtn.textContent = discipline;
        navBtn.addEventListener("click", () => {
          const el = document.getElementById(safeId);
          if (el) {
            el.scrollIntoView({ behavior: "smooth" });
          }
        });
        nav.appendChild(navBtn);

        const card = document.createElement("div");
        card.className = "discipline-card";
        card.id = safeId;

        const title = document.createElement("div");
        title.className = "discipline-title";
        title.textContent = discipline;
        card.appendChild(title);

        card.appendChild(createResultTable(teams, disciplineResults[discipline] || {}));
        container.appendChild(card);
      });
    }

    subscribeToData(renderDisciplinesPage);
  </script>
</body>
</html>
