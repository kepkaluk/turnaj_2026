<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Párový turnaj 2026 - Nastavení</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      color: #111;
    }

    .header {
      text-align: center;
      background: #eaeaea;
      padding-top: 20px;
    }

    .header h1 {
      margin: 0 0 20px 0;
      font-size: 2.6rem;
    }

    .navbar {
      background: #333;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .section {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      flex: 1;
      min-width: 220px;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 15px 0 0 0;
    }

    li {
      padding: 10px 12px;
      margin-top: 8px;
      background: #eee;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .bottom-button {
      text-align: center;
      margin-top: 20px;
    }

    .note {
      color: #666;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Párový turnaj 2026</h1>

    <div class="navbar">
      <a href="index.html">Domů</a>
      <a href="disciplines.html">Disciplíny</a>
      <a href="turnaj.html">Nastavení</a>
      <a href="spravce.html">Správce</a>
    </div>
  </div>

  <div class="container">

    <!-- TÝMY -->
    <div class="section">
      <h2>Týmy</h2>

      <div class="input-row">
        <input type="text" id="teamInput" placeholder="Název týmu">
        <button id="addTeamBtn">Přidat</button>
      </div>

      <div class="note">
        Týmy se ukládají online (Firebase).
      </div>

      <ul id="teamList"></ul>
    </div>

    <!-- DISCIPLÍNY -->
    <div class="section">
      <h2>Disciplíny</h2>

      <div class="input-row">
        <input type="text" id="disciplineInput" placeholder="Název disciplíny">
        <button id="addDisciplineBtn">Přidat</button>
      </div>

      <div class="note">
        Disciplíny se ukládají online (Firebase).
      </div>

      <ul id="disciplineList"></ul>
    </div>

    <div class="bottom-button">
      <button onclick="window.location.href='index.html'">
        Pokračovat na výsledky
      </button>
    </div>

  </div>

  <!-- JS -->
  <script type="module">
    import { loadData, saveData, subscribeToData } from "./firebase.js";

    let currentData = {
      teams: [],
      disciplines: [],
      disciplineSchedule: {},
      disciplineResults: {}
    };

    // ===== RENDER =====
    function renderTeams() {
      const list = document.getElementById("teamList");
      list.innerHTML = "";

      currentData.teams.forEach((team) => {
        const li = document.createElement("li");

        const btn = document.createElement("button");
        btn.textContent = "❌";

        btn.onclick = async () => {
          const data = await loadData();

          data.teams = data.teams.filter(t => t !== team);

          // smažeme výsledky týmu
          Object.keys(data.disciplineResults).forEach(d => {
            delete data.disciplineResults[d][team];
          });

          await saveData(data);
        };

        li.append(team, btn);
        list.appendChild(li);
      });
    }

    function renderDisciplines() {
      const list = document.getElementById("disciplineList");
      list.innerHTML = "";

      currentData.disciplines.forEach((discipline) => {
        const li = document.createElement("li");

        const btn = document.createElement("button");
        btn.textContent = "❌";

        btn.onclick = async () => {
          const data = await loadData();

          data.disciplines = data.disciplines.filter(d => d !== discipline);
          delete data.disciplineSchedule[discipline];
          delete data.disciplineResults[discipline];

          await saveData(data);
        };

        li.append(discipline, btn);
        list.appendChild(li);
      });
    }

    // ===== PŘIDÁNÍ =====
    document.getElementById("addTeamBtn").onclick = async () => {
      const input = document.getElementById("teamInput");
      const name = input.value.trim();

      if (!name) return;

      const data = await loadData();

      if (!data.teams.includes(name)) {
        data.teams.push(name);
        await saveData(data);
      }

      input.value = "";
    };

    document.getElementById("addDisciplineBtn").onclick = async () => {
      const input = document.getElementById("disciplineInput");
      const name = input.value.trim();

      if (!name) return;

      const data = await loadData();

      if (!data.disciplines.includes(name)) {
        data.disciplines.push(name);
        await saveData(data);
      }

      input.value = "";
    };

    // ===== LIVE UPDATE =====
    subscribeToData((data) => {
      currentData = data;
      renderTeams();
      renderDisciplines();
    });

  </script>

</body>
</html>
